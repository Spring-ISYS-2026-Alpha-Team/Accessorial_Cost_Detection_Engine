name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install flake8
        run: python -m pip install --upgrade pip flake8

      - name: Lint — errors (blocking)
        run: |
          python -m flake8 \
            auth_utils.py app.py pages pipeline tests utils scripts \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Lint — style (non-blocking)
        run: |
          python -m flake8 \
            auth_utils.py app.py pages pipeline tests utils scripts \
            --count \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exit-zero \
            --statistics

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install bandit
        run: python -m pip install --upgrade pip bandit

      - name: Run bandit
        run: |
          python -m bandit \
            -r auth_utils.py app.py pages pipeline tests utils scripts \
            -ll \
            --quiet

  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y freetds-dev freetds-bin

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify key imports
        run: |
          python -c "import streamlit, pandas, pymssql, dotenv"
          echo "Core imports resolved."

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y freetds-dev freetds-bin

      - name: Install dependencies + pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests --ignore=venv --ignore=.venv -q --tb=short; code=$?
          if [ $code -eq 5 ]; then
            echo "No test files found yet — skipping."
            exit 0
          fi
          exit $code
